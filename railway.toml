# Перекрывает Start Command из UI (иначе после одного только `migrate` контейнер выходит → 502).
# Для сервиса только с этим репо / корнем backend. Отдельный frontend-сервис: свой root или без этого файла.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Inline через sh — без отдельного .sh (иначе на Windows/CRLF: exec … No such file or directory)
startCommand = "sh -c 'npx prisma migrate deploy && exec node dist/main.js'"
healthcheckPath = "/health"
healthcheckTimeout = 120
