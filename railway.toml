# Бэкенд в корне репозитория.
#
# «Docker не включён» на Railway = сборка через Railpack (Nixpacks), а не из Dockerfile в репо.
# Dockerfile в git остаётся для тех, кто собирает образ локально/в другом окружении; здесь builder = RAILPACK
# заставляет Railway не использовать его.
#
# Отдельный frontend-сервис: свой Root Directory (например frontend/) или свой конфиг.

[build]
builder = "RAILPACK"
buildCommand = "npm ci && npx prisma generate && npm run build"

[deploy]
startCommand = "sh -c 'npx prisma migrate deploy && exec node dist/main.js'"
healthcheckPath = "/health"
healthcheckTimeout = 120
